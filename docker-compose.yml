services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absensi-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - ASSET_URL=http://localhost:8000
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=db_absensi_karyawan
      - DB_USERNAME=absensi
      - DB_PASSWORD=secret
      - SESSION_DRIVER=database
      - CACHE_STORE=database
      - QUEUE_CONNECTION=database
      - DEVICE_RESTRICTION_ENABLED=false
    volumes:
      - app-storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: absensi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_absensi_karyawan
      MYSQL_USER: absensi
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  app-storage:
